<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collab Server Window</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --ok: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background: radial-gradient(circle at 20% -20%, #172554 0%, var(--bg) 60%);
      color: var(--text);
    }
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      backdrop-filter: blur(6px);
      background: rgba(15, 23, 42, 0.85);
      z-index: 2;
    }
    input, button {
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
    }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(17,24,39,0.95), rgba(17,24,39,0.75));
      overflow: hidden;
    }
    .card h3 {
      margin: 0;
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .card .content { padding: 10px 12px; }
    .row { display: flex; justify-content: space-between; margin: 4px 0; }
    .muted { color: var(--muted); }
    .good { color: var(--ok); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid #1f2937;
      padding: 6px 4px;
      text-align: left;
      vertical-align: top;
    }
    .mono { font-family: inherit; }
    .full { grid-column: 1 / -1; }
    .chart-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
    }
    .chart-row svg {
      width: 320px;
      max-width: 100%;
      height: 44px;
      border: 1px solid #1f2937;
      border-radius: 6px;
      background: #0b1220;
      flex: 1;
    }
    .chart-path {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
    }
    .chart-dot {
      fill: #e5e7eb;
      cursor: default;
    }
    .chart-dot-rejected {
      fill: var(--warn);
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .full { grid-column: auto; }
    }
  </style>
</head>
<body>
<div class="topbar">
  <strong>Collab Server Window</strong>
  <label class="muted">Limit <input id="limit" type="number" min="1" max="200" value="25" style="width:80px"></label>
  <label class="muted">Focus model <input id="modelId" placeholder="demo" style="width:140px"></label>
  <label class="muted">Issue filter
    <select id="severityFilter">
      <option value="all">all</option>
      <option value="error">error</option>
      <option value="warn">warn</option>
      <option value="info">info</option>
    </select>
  </label>
  <label class="muted">Issue search <input id="issueSearch" placeholder="code/id/text" style="width:160px"></label>
  <button id="refreshBtn">Refresh</button>
  <button id="rebuildBtn">Rebuild Focus Model</button>
  <button id="deleteBtn">Delete Focus Model</button>
  <span id="stamp" class="muted"></span>
</div>

<div class="grid">
  <section class="card">
    <h3>Models Overview</h3>
    <div class="content">
      <table id="modelsTable">
        <thead>
        <tr>
          <th>Model</th>
          <th>Sessions</th>
          <th>Snap Head</th>
          <th>Persisted</th>
          <th>Commit</th>
          <th>Consistent</th>
        </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <section class="card">
    <h3>Focus Model Status</h3>
    <div class="content" id="focusStatus"></div>
  </section>

  <section class="card">
    <h3>Integrity</h3>
    <div class="content" id="integrityStatus"></div>
  </section>

  <section class="card full">
    <h3>Style History</h3>
    <div class="content" id="styleHistory"></div>
  </section>

  <section class="card full">
    <h3>Recent Activity</h3>
    <div class="content">
      <table id="activityTable">
        <thead><tr><th>Time</th><th>Type</th><th>Details</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <section class="card full">
    <h3>Recent Op Batches</h3>
    <div class="content">
      <table id="opsTable">
        <thead><tr><th>Batch</th><th>Base</th><th>Assigned</th><th>Ops</th><th>Cascade Deletes</th><th>Timestamp</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <section class="card full">
    <h3>Integrity Issues</h3>
    <div class="content">
      <table id="integrityTable">
        <thead><tr><th>Code</th><th>Severity</th><th>Entity</th><th>ID</th><th>Message</th><th>Suggested Action</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</div>

<script>
  const modelsTable = document.querySelector("#modelsTable tbody");
  const activityTable = document.querySelector("#activityTable tbody");
  const opsTable = document.querySelector("#opsTable tbody");
  const integrityTable = document.querySelector("#integrityTable tbody");
  const focusStatus = document.getElementById("focusStatus");
  const integrityStatus = document.getElementById("integrityStatus");
  const styleHistory = document.getElementById("styleHistory");
  const stamp = document.getElementById("stamp");
  const limitInput = document.getElementById("limit");
  const modelInput = document.getElementById("modelId");
  const severityFilter = document.getElementById("severityFilter");
  const issueSearch = document.getElementById("issueSearch");

  function safe(v) { return v === undefined || v === null ? "" : String(v); }
  function esc(v) { return safe(v).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
  function cssBool(v) { return v ? "good" : "bad"; }
  function toInt(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }

  function makeLineChartSvg(values, options = {}) {
    const width = options.width || 320;
    const height = options.height || 44;
    const pad = 5;
    const strokeClass = options.strokeClass || "chart-path";
    const dotClass = options.dotClass || "chart-dot";
    const label = options.label || "series";
    const vals = (values && values.length ? values : [0]);
    const max = Math.max(...vals, 1);
    const min = Math.min(...vals, 0);
    const span = Math.max(1, max - min);
    const step = vals.length > 1 ? (width - pad * 2) / (vals.length - 1) : 0;

    const points = vals.map((v, i) => {
      const x = pad + i * step;
      const y = height - pad - ((v - min) / span) * (height - pad * 2);
      return { x, y, v, i };
    });

    const d = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ");

    const dots = points.map(p => {
      const tip = `${label}[${p.i}] = ${p.v}`;
      return `<circle class="${dotClass}" cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="2.4"><title>${esc(tip)}</title></circle>`;
    }).join("");

    return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-label="${esc(label)} trend">
      <path class="${strokeClass}" d="${d}"></path>
      ${dots}
    </svg>`;
  }

  async function fetchJson(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${url}`);
    return res.json();
  }

  function renderOverview(overview) {
    modelsTable.innerHTML = "";
    for (const w of overview) {
      const c = w.status?.consistency || {};
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><button data-model="${esc(w.modelId)}">${esc(w.modelId)}</button></td>
        <td>${safe(w.activeSessionCount)}</td>
        <td>${safe(w.status?.snapshotHeadRevision)}</td>
        <td>${safe(c.persistedHeadRevision)}</td>
        <td>${safe(c.latestCommitRevision)}</td>
        <td class="${cssBool(c.consistent)}">${safe(c.consistent)}</td>
      `;
      modelsTable.appendChild(tr);
    }
    modelsTable.querySelectorAll("button[data-model]").forEach(btn => {
      btn.addEventListener("click", () => {
        modelInput.value = btn.getAttribute("data-model");
        refresh();
      });
    });
  }

  function renderFocus(window) {
    if (!window) {
      focusStatus.innerHTML = `<div class="muted">Set Focus model and refresh.</div>`;
      integrityStatus.innerHTML = `<div class="muted">No model selected.</div>`;
      styleHistory.innerHTML = `<div class="muted">No model selected.</div>`;
      activityTable.innerHTML = "";
      opsTable.innerHTML = "";
      integrityTable.innerHTML = "";
      return;
    }
    const s = window.status || {};
    const c = s.consistency || {};
    const style = window.styleCounters || {};
    focusStatus.innerHTML = `
      <div class="row"><span class="muted">Model</span><span>${esc(window.modelId)}</span></div>
      <div class="row"><span class="muted">Active sessions</span><span>${safe(window.activeSessionCount)}</span></div>
      <div class="row"><span class="muted">Snapshot head</span><span>${safe(s.snapshotHeadRevision)}</span></div>
      <div class="row"><span class="muted">Persisted head</span><span>${safe(c.persistedHeadRevision)}</span></div>
      <div class="row"><span class="muted">Latest commit</span><span>${safe(c.latestCommitRevision)}</span></div>
      <div class="row"><span class="muted">Elements / Relationships</span><span>${safe(s.elementCount)} / ${safe(s.relationshipCount)}</span></div>
      <div class="row"><span class="muted">Views / Objects / Connections</span><span>${safe(s.viewCount)} / ${safe(s.viewObjectCount)} / ${safe(s.connectionCount)}</span></div>
      <div class="row"><span class="muted">Style ops received</span><span>${safe(style.received)}</span></div>
      <div class="row"><span class="muted">Style ops accepted</span><span>${safe(style.accepted)}</span></div>
      <div class="row"><span class="muted">Style ops applied</span><span>${safe(style.applied)}</span></div>
      <div class="row"><span class="muted">Style ops rejected</span><span class="${style.rejected > 0 ? 'warn' : 'good'}">${safe(style.rejected)}</span></div>
      <div class="row"><span class="muted">Head aligned</span><span class="${cssBool(c.headAligned)}">${safe(c.headAligned)}</span></div>
      <div class="row"><span class="muted">Commit aligned</span><span class="${cssBool(c.commitAligned)}">${safe(c.commitAligned)}</span></div>
      <div class="row"><span class="muted">Materialized consistent</span><span class="${cssBool(c.materializedStateConsistent)}">${safe(c.materializedStateConsistent)}</span></div>
      <div class="row"><span class="muted">Overall consistent</span><span class="${cssBool(c.consistent)}">${safe(c.consistent)}</span></div>
    `;

    const i = window.integrity || {};
    integrityStatus.innerHTML = `
      <div class="row"><span class="muted">Integrity OK</span><span class="${cssBool(i.ok)}">${safe(i.ok)}</span></div>
      <div class="row"><span class="muted">Issue count</span><span>${safe(i.issueCount)}</span></div>
      <div class="row"><span class="muted">Missing rel endpoints</span><span>${safe(i.missingRelationshipEndpointCount)}</span></div>
      <div class="row"><span class="muted">Missing conn endpoints</span><span>${safe(i.missingConnectionEndpointCount)}</span></div>
      <div class="row"><span class="muted">Missing view refs</span><span>${safe(i.missingViewObjectReferenceCount)}</span></div>
      <div class="row"><span class="muted">Missing view container</span><span>${safe(i.missingViewContainerCount)}</span></div>
    `;

    const styleEvents = (window.recentActivity || []).filter(a => String(a.type || "").startsWith("StyleOps"));
    const recentStyleEvents = styleEvents.slice(-24);
    const buckets = { Received: [], Accepted: [], Applied: [], Rejected: [] };
    for (const e of recentStyleEvents) {
      const countMatch = String(e.details || "").match(/count=(\d+)/);
      const count = countMatch ? toInt(countMatch[1]) : 0;
      const t = String(e.type || "");
      const isRejected = t.includes("Rejected");
      const isAccepted = t.includes("Accepted");
      const isApplied = t.includes("Applied");
      const isReceived = t.includes("Received");
      buckets.Received.push(isReceived ? count : 0);
      buckets.Accepted.push(isAccepted ? count : 0);
      buckets.Applied.push(isApplied ? count : 0);
      buckets.Rejected.push(isRejected ? count : 0);
    }

    const sumReceived = buckets.Received.reduce((a,b)=>a+b,0);
    const sumAccepted = buckets.Accepted.reduce((a,b)=>a+b,0);
    const sumApplied = buckets.Applied.reduce((a,b)=>a+b,0);
    const sumRejected = buckets.Rejected.reduce((a,b)=>a+b,0);

    styleHistory.innerHTML = `
      <div class="row"><span class="muted">Window</span><span>last ${recentStyleEvents.length} style events</span></div>
      <div class="chart-row"><span class="muted">Received (${sumReceived})</span>${makeLineChartSvg(buckets.Received, { label: "received" })}</div>
      <div class="chart-row"><span class="muted">Accepted (${sumAccepted})</span>${makeLineChartSvg(buckets.Accepted, { label: "accepted" })}</div>
      <div class="chart-row"><span class="muted">Applied (${sumApplied})</span>${makeLineChartSvg(buckets.Applied, { label: "applied" })}</div>
      <div class="chart-row"><span class="muted ${sumRejected > 0 ? "warn" : "good"}">Rejected (${sumRejected})</span>${makeLineChartSvg(buckets.Rejected, { label: "rejected", dotClass: "chart-dot chart-dot-rejected" })}</div>
      <div class="muted" style="margin-top:8px">Hover a point to see value. Sequence (newest last): ${recentStyleEvents.map(e => esc(e.type)).join(" -> ") || "none"}</div>
    `;

    activityTable.innerHTML = "";
    for (const a of (window.recentActivity || [])) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${esc(a.timestamp)}</td><td>${esc(a.type)}</td><td class="mono">${esc(a.details)}</td>`;
      activityTable.appendChild(tr);
    }

    opsTable.innerHTML = "";
    for (const b of (window.recentOpBatches || [])) {
      const tr = document.createElement("tr");
      const from = b.assignedRevisionRange?.from;
      const to = b.assignedRevisionRange?.to;
      const ops = Array.isArray(b.ops) ? b.ops : [];
      const cascadeDeletes = ops.filter(op => String(op.generatedBy || "") === "CascadeDelete").length;
      tr.innerHTML = `
        <td class="mono">${esc(b.opBatchId)}</td>
        <td>${safe(b.baseRevision)}</td>
        <td>${safe(from)}..${safe(to)}</td>
        <td>${ops.length}</td>
        <td class="${cascadeDeletes > 0 ? "warn" : "muted"}">${cascadeDeletes}</td>
        <td>${esc(b.timestamp)}</td>
      `;
      opsTable.appendChild(tr);
    }

    integrityTable.innerHTML = "";
    const filterSeverity = (severityFilter.value || "all").toLowerCase();
    const filterText = (issueSearch.value || "").trim().toLowerCase();
    const issues = (window.integrity?.issues || []).filter(issue => {
      if (filterSeverity !== "all" && String(issue.severity || "").toLowerCase() !== filterSeverity) {
        return false;
      }
      if (!filterText) {
        return true;
      }
      const haystack = `${issue.code || ""} ${issue.entityId || ""} ${issue.entityType || ""} ${issue.message || ""} ${issue.suggestedAction || ""}`.toLowerCase();
      return haystack.includes(filterText);
    });

    for (const issue of issues) {
      const tr = document.createElement("tr");
      const sevClass = issue.severity === "error" ? "bad" : (issue.severity === "warn" ? "warn" : "muted");
      tr.innerHTML = `
        <td>${esc(issue.code)}</td>
        <td class="${sevClass}">${esc(issue.severity)}</td>
        <td>${esc(issue.entityType)}</td>
        <td class="mono">${esc(issue.entityId)}</td>
        <td class="mono">${esc(issue.message)}</td>
        <td class="mono">${esc(issue.suggestedAction)}</td>
      `;
      integrityTable.appendChild(tr);
    }
  }

  async function refresh() {
    const limit = Math.max(1, Math.min(200, parseInt(limitInput.value || "25", 10)));
    const modelId = (modelInput.value || "").trim();
    stamp.textContent = "Refreshing...";
    try {
      const overview = await fetchJson(`/admin/overview?limit=${limit}`);
      renderOverview(overview);
      if (modelId) {
        const window = await fetchJson(`/admin/models/${encodeURIComponent(modelId)}/window?limit=${limit}`);
        renderFocus(window);
      } else {
        renderFocus(null);
      }
      stamp.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      stamp.textContent = `Error: ${err.message}`;
    }
  }

  async function rebuildFocused() {
    const modelId = (modelInput.value || "").trim();
    if (!modelId) {
      stamp.textContent = "Set Focus model first.";
      return;
    }
    stamp.textContent = "Rebuilding...";
    try {
      const res = await fetch(`/admin/models/${encodeURIComponent(modelId)}/rebuild-and-status`, { method: "POST" });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      const payload = await res.json();
      stamp.textContent = `Rebuild ok: head=${payload.rebuild?.rebuiltHeadRevision}, consistent=${payload.rebuild?.consistent}`;
      await refresh();
    } catch (err) {
      stamp.textContent = `Rebuild failed: ${err.message}`;
    }
  }

  async function deleteFocused() {
    const modelId = (modelInput.value || "").trim();
    if (!modelId) {
      stamp.textContent = "Set Focus model first.";
      return;
    }
    const ok = window.confirm(`Delete model '${modelId}' from server state? This is for development resets.`);
    if (!ok) {
      return;
    }
    stamp.textContent = "Deleting model...";
    try {
      const res = await fetch(`/admin/models/${encodeURIComponent(modelId)}`, { method: "DELETE" });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      const payload = await res.json();
      stamp.textContent = payload.deleted
        ? `Deleted model '${modelId}'`
        : `Delete rejected: ${payload.message}`;
      await refresh();
    } catch (err) {
      stamp.textContent = `Delete failed: ${err.message}`;
    }
  }

  document.getElementById("refreshBtn").addEventListener("click", refresh);
  document.getElementById("rebuildBtn").addEventListener("click", rebuildFocused);
  document.getElementById("deleteBtn").addEventListener("click", deleteFocused);
  severityFilter.addEventListener("change", refresh);
  issueSearch.addEventListener("input", refresh);
  setInterval(refresh, 4000);
  refresh();
</script>
</body>
</html>
