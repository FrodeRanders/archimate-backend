# WebSocket endpoint uses default HTTP port 8080.
quarkus.http.port=8081

# Local dev infra defaults from dev-setup.md
app.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
app.neo4j.username=${NEO4J_USER:neo4j}
app.neo4j.password=${NEO4J_PASSWORD:devpassword}
app.consistency.check-enabled=${COLLAB_CONSISTENCY_CHECK:false}

kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic.prefix=${KAFKA_TOPIC_PREFIX:archi.model}
kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:archi-collab-server}
kafka.consumer.auto-offset-reset=${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}

# App logs default to INFO, set COLLAB_LOG_LEVEL=DEBUG for detailed flow tracing.
quarkus.log.level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."io.archi.collab".level=${COLLAB_LOG_LEVEL:INFO}
quarkus.log.category."org.apache.kafka".level=WARN
