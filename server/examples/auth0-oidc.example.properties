# Example external OIDC setup for Auth0.
# Copy the relevant keys into your real runtime config and replace placeholder values.

app.authz.enabled=true
app.identity.mode=oidc
quarkus.oidc.enabled=true

# Canonical archimesh roles used by the in-process PDP.
app.authz.admin-role=admin
app.authz.reader-role=model_reader
app.authz.writer-role=model_writer

# Example Auth0 roles mapped into the canonical roles above.
app.authz.admin-role-aliases=archimesh-admin,admin
app.authz.reader-role-aliases=archimesh-reader,viewer
app.authz.writer-role-aliases=archimesh-writer,editor

# Auth0 tenant endpoint and API audience/client.
quarkus.oidc.auth-server-url=https://tenant.eu.auth0.com/
quarkus.oidc.client-id=archimesh-server
quarkus.oidc.application-type=service
quarkus.oidc.token.audience=https://archimesh.example/api

# Common Auth0 role claim layouts.
# Use the one that matches your Auth0 action/rule/token customization.
quarkus.oidc.roles.role-claim-path=permissions
# quarkus.oidc.roles.role-claim-path=https://archimesh.example/roles

# Optional if your deployment requires TLS trust customization.
# quarkus.tls.trust-all=false
