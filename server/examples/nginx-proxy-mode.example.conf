# Example Nginx reverse proxy for app.identity.mode=proxy.
# This file demonstrates:
# - forwarding REST and websocket traffic to Quarkus
# - forwarding trusted identity headers for the Quarkus PEP
# - a simple local smoke-test mode with fixed headers
#
# In production, replace the fixed-header block with a real authn layer
# (for example oauth2-proxy, ingress auth_request, or another SSO gateway)
# that sets X-Forwarded-User / X-Forwarded-Roles after authenticating the caller.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name collab.example;

    # Quarkus backend
    set $collab_upstream http://127.0.0.1:8081;

    # ------------------------------------------------------------------
    # Local smoke-test mode only:
    # Uncomment these two lines to force a fixed admin identity through the
    # proxy when validating app.identity.mode=proxy end-to-end.
    #
    # set $collab_user "admin-user";
    # set $collab_roles "admin,model_writer,model_reader";
    # ------------------------------------------------------------------

    location / {
        proxy_http_version 1.1;
        proxy_pass $collab_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Trusted identity forwarded to Quarkus when app.identity.mode=proxy
        proxy_set_header X-Forwarded-User $collab_user;
        proxy_set_header X-Forwarded-Roles $collab_roles;

        # If an upstream auth layer already sets the forwarded identity,
        # remove the fixed-header 'set' lines above and keep these pass-through
        # assignments instead:
        #
        # proxy_set_header X-Forwarded-User $http_x_forwarded_user;
        # proxy_set_header X-Forwarded-Roles $http_x_forwarded_roles;
    }
}
