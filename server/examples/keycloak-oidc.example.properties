# Example external OIDC setup for Keycloak.
# Copy the relevant keys into your real runtime config and replace placeholder values.

app.authz.enabled=true
app.identity.mode=oidc
quarkus.oidc.enabled=true

# Canonical collaboration roles used by the in-process PDP.
app.authz.admin-role=admin
app.authz.reader-role=model_reader
app.authz.writer-role=model_writer

# Example Keycloak realm/client roles mapped into the canonical roles above.
app.authz.admin-role-aliases=realm-admin,collab-admin
app.authz.reader-role-aliases=realm-viewer,collab-reader
app.authz.writer-role-aliases=realm-editor,collab-writer

# Keycloak realm endpoint and client.
quarkus.oidc.auth-server-url=https://keycloak.example/realms/collab
quarkus.oidc.client-id=collab-server
quarkus.oidc.application-type=service

# Common Keycloak group/role claim layouts.
# Use the one that matches how your tokens are issued.
quarkus.oidc.roles.role-claim-path=groups
# quarkus.oidc.roles.role-claim-path=realm_access/roles

# Optional if your deployment requires audience enforcement or TLS trust customization.
# quarkus.oidc.token.audience=collab-server
# quarkus.tls.trust-all=false
