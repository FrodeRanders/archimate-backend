name: CRDT Local Infra

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crdt-local-infra:
    runs-on: ubuntu-latest
    env:
      ARCHI_REPO: ${{ vars.ARCHI_REPO }}
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
    steps:
      - name: Checkout archimate
        uses: actions/checkout@v4

      - name: Resolve ARCHI_REPO default
        shell: bash
        run: |
          if [[ -z "${ARCHI_REPO:-}" ]]; then
            echo "ARCHI_REPO=${GITHUB_REPOSITORY_OWNER}/archi" >> "$GITHUB_ENV"
          fi

      - name: Checkout archi sibling repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ARCHI_REPO }}
          path: archi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start Docker infra
        shell: bash
        run: docker compose up -d

      - name: Wait for Neo4j
        shell: bash
        run: |
          for i in {1..60}; do
            if docker compose exec -T neo4j cypher-shell -u "$NEO4J_USER" -p "$NEO4J_PASSWORD" "RETURN 1" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Neo4j did not become ready in time" >&2
          exit 1

      - name: Apply Neo4j schema
        shell: bash
        run: docker compose exec -T neo4j cypher-shell -u "$NEO4J_USER" -p "$NEO4J_PASSWORD" < neo4j/schema.cypher

      - name: Run CRDT gate with local infra IT
        shell: bash
        env:
          ARCHI_DIR: ${{ github.workspace }}/archi
          RUN_LOCAL_INFRA_IT: "true"
        run: ./scripts/crdt-gate.sh

      - name: Dump compose logs on failure
        if: failure()
        shell: bash
        run: docker compose logs --no-color

      - name: Stop Docker infra
        if: always()
        shell: bash
        run: docker compose down -v
